services:
  postgres:
    image: postgres:16
    container_name: nocode_platform_pg
    environment:
      POSTGRES_DB: nocode_platform
      POSTGRES_USER: nocode
      POSTGRES_PASSWORD: nocode
    ports:
      - "55432:5432"
    volumes:
      - nocode_platform_pg_data:/var/lib/postgresql/data

volumes:
  nocode_platform_pg_data: