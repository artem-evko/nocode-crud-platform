version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: nocode-db
    environment:
      POSTGRES_USER: nocode
      POSTGRES_PASSWORD: nocode_password
      POSTGRES_DB: nocode_platform
    ports:
      - "5434:5432"
    volumes:
      - nocode-db-data:/var/lib/postgresql/data
    networks:
      - nocode-network

  backend:
    build:
      context: .
      dockerfile: platform-web/Dockerfile
    container_name: nocode-backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/nocode_platform
      - SPRING_DATASOURCE_USERNAME=nocode
      - SPRING_DATASOURCE_PASSWORD=nocode_password
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - database
    networks:
      - nocode-network

  frontend:
    build:
      context: ./platform-frontend
      dockerfile: Dockerfile
    container_name: nocode-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nocode-network

volumes:
  nocode-db-data:

networks:
  nocode-network:
    driver: bridge