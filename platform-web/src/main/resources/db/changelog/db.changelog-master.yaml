databaseChangeLog:
  - changeSet:
      id: 1
      author: nocode
      changes:
        - createTable:
            tableName: projects
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: artifact_id
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: base_package
                  type: varchar(300)
                  constraints:
                    nullable: false
              - column:
                  name: spec_text
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: projects
            indexName: idx_projects_artifact
            columns:
              - column:
                  name: artifact_id
  - changeSet:
      id: 2
      author: nocode
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column:
                  name: auth_enabled
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: generate_frontend
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
  - changeSet:
      id: 3
      author: nocode
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column:
                  name: deployment_status
                  type: varchar(50)
              - column:
                  name: deployment_url
                  type: varchar(300)
  - changeSet:
      id: 4
      author: nocode
      changes:
        - createTable:
            tableName: platform_users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(50)
                  defaultValue: 'USER'
                  constraints:
                    nullable: false
        - createIndex:
            tableName: platform_users
            indexName: idx_platform_users_username
            columns:
              - column:
                  name: username
  - changeSet:
      id: 5
      author: nocode
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column:
                  name: owner_username
                  type: varchar(100)
                  defaultValue: 'admin'
                  constraints:
                    nullable: false
        - createIndex:
            tableName: projects
            indexName: idx_projects_owner
            columns:
              - column:
                  name: owner_username